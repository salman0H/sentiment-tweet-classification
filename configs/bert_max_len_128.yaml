name: bert_max_len_128
model_key: bert
freeze_encoder: false
max_length: 128
optimizer: adamw
learning_rate: 2e-5
weight_decay: 0.01
epochs: 3
train_batch_size: 8
eval_batch_size: 16
warmup_ratio: 0.06
preprocessing:
  fix_literal_unicode_escapes: true
  unescape_literal_quotes: true
  strip_wrapping_quotes: true
  normalize_whitespace: true
  replace_user_mentions: false
  strip_urls: false
  lowercase: false
  collapse_repeated_chars: false
