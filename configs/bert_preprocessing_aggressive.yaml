name: bert_preprocessing_aggressive
model_key: bert
freeze_encoder: false
max_length: 64
optimizer: adamw
learning_rate: 2e-5
weight_decay: 0.01
epochs: 3
train_batch_size: 32
eval_batch_size: 64
warmup_ratio: 0.06
preprocessing:
  fix_literal_unicode_escapes: true
  unescape_literal_quotes: true
  strip_wrapping_quotes: true
  normalize_whitespace: true
  replace_user_mentions: true
  strip_urls: true
  lowercase: true
  collapse_repeated_chars: true
